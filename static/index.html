<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dungeon Intercom</title>
  <meta property="og:title" content="The Dungeon Intercom">
  <meta property="og:description" content="Describe what you did, crawler. The dungeon will judge you for it.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      color: #f0c040;
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .subtitle {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
    }
    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus { outline: none; border-color: #f0c040; }
    button {
      padding: 0.75rem 1.5rem;
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #ffd060; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }

    .status {
      color: #f0c040;
      font-size: 0.85rem;
      height: 1.2rem;
      margin-bottom: 1rem;
    }
    .status.pulsing { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .card {
      width: 100%;
      max-width: 600px;
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: none;
      animation: fadeIn 0.4s ease-out;
    }
    .card.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .card-header {
      background: #f0c040;
      color: #1a1a2e;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.8rem;
      display: inline-block;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .card-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .card-header { margin-bottom: 0; }
    .card-date {
      color: #666;
      font-size: 0.7rem;
    }
    .card-trigger {
      color: #666;
      font-size: 0.75rem;
      font-style: italic;
      margin-bottom: 0.6rem;
    }
    .card-trigger::before { content: '"'; }
    .card-trigger::after { content: '"'; }
    .card-title {
      color: #f0c040;
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
    }
    .card-title::before { content: "\2605  "; }
    .card-desc {
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .card-reward {
      border-top: 1px solid #333;
      padding-top: 0.8rem;
      color: #e0e0e0;
    }
    .card-reward strong { color: #f0c040; margin-right: 0.5rem; }
    .card-actions { margin-top: 1rem; text-align: right; }
    .share-btn {
      padding: 0.4rem 1rem;
      background: transparent;
      color: #f0c040;
      border: 1px solid #f0c040;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .share-btn:hover { background: #f0c040; color: #1a1a2e; }

    .history { width: 100%; max-width: 600px; }
    .history h2 {
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.4rem;
    }
    .history-item {
      padding: 0.6rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
    }
    .history-item:hover { background: #16213e; }
    .history-item .title { color: #f0c040; font-size: 0.85rem; }
    .history-item .trigger { color: #666; font-size: 0.75rem; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-empty { color: #555; font-size: 0.85rem; font-style: italic; }
    .history-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0 0.2rem;
      border-top: 1px solid #333;
      margin-top: 0.3rem;
    }
    .page-btn {
      color: #f0c040;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .page-btn:hover { text-decoration: underline; }
    .page-info { color: #666; font-size: 0.75rem; }

    /* Mobile responsive */
    @media (max-width: 640px) {
      body { padding: 1.2rem 0.8rem; }
      h1 { font-size: 1.3rem; letter-spacing: 2px; text-align: center; }
      .subtitle { font-size: 0.7rem; text-align: center; margin-bottom: 1.2rem; }
      .input-row { flex-direction: column; }
      input[type="text"] { font-size: 1rem; padding: 0.9rem 1rem; }
      button { padding: 0.9rem; font-size: 1rem; }
      .card { padding: 1.2rem; }
      .card-header { font-size: 0.7rem; letter-spacing: 1px; }
      .card-title { font-size: 1.1rem; }
      .card-desc { font-size: 0.85rem; line-height: 1.5; }
      .card-reward { font-size: 0.85rem; }
      .card-reward strong { display: block; margin-bottom: 0.3rem; }
      .history-item { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .history-item .trigger { max-width: 100%; }
      .share-btn { width: 100%; padding: 0.6rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <h1>The Dungeon Intercom</h1>
  <p class="subtitle">describe what you did, crawler. princess donut is watching.</p>

  <div class="input-row">
    <input type="text" id="trigger" placeholder="e.g. took a 2 hour lunch and nobody noticed" />
    <button id="generate" onclick="handleGenerate()">Generate</button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="card">
    <div class="card-top-row">
      <div class="card-header">Achievement Unlocked</div>
      <div class="card-date" id="cardDate"></div>
    </div>
    <div class="card-trigger" id="cardTrigger"></div>
    <div class="card-title" id="cardTitle"></div>
    <div class="card-desc" id="cardDesc"></div>
    <div class="card-reward"><strong>REWARD</strong> <span id="cardReward"></span></div>
    <div class="card-actions" id="cardActions" style="display:none;">
      <button class="share-btn" id="shareLinkBtn" onclick="handleShareLink()">Copy Link</button>
      <button class="share-btn" id="shareBtn" onclick="handleShare()">Download Card</button>
    </div>
  </div>

  <div class="history">
    <h2>Achievement History</h2>
    <div id="historyList"><p class="history-empty">No achievements yet. Go do something questionable.</p></div>
  </div>

  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    /* Audio unlock strategy for mobile browsers:
       1. On user click, play a silent audio buffer through a shared Audio element
       2. Reuse that same element for all subsequent playback
       This keeps the audio pipeline "warm" so plays work after async delays (SSE) */
    let sharedAudio = null;

    function unlockAudio() {
      if (sharedAudio) return;
      sharedAudio = new Audio();
      /* Play a tiny silent WAV (44 bytes, valid WAV header with 0 samples) */
      sharedAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
      sharedAudio.play().catch(() => {});
    }

    function playAudio(url) {
      return new Promise((resolve) => {
        /* Reuse the shared audio element to stay in the browser's
           allowed-playback chain from the original user gesture */
        const audio = sharedAudio || new Audio();
        sharedAudio = audio;
        audio.onended = () => resolve();
        audio.onerror = () => {
          console.warn('Audio playback failed, skipping:', url);
          resolve();
        };
        audio.src = url;
        audio.play().catch(() => {
          console.warn('Audio play blocked, skipping:', url);
          resolve();
        });
      });
    }

    async function playSequence(urls) {
      /* Single concatenated file — pauses are baked into the audio */
      if (urls.length > 0) {
        await playAudio(urls[0]);
      }
    }

    let currentAchievementId = null;

    function stripAnnouncerTags(desc) {
      return desc.replace(/^New Achievement!\s*/i, '').replace(/\s*Your Reward!\s*$/i, '').trim();
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function showCard(data) {
      currentAchievementId = data.id;
      document.getElementById('cardDate').textContent = formatDate(data.timestamp);
      const triggerEl = document.getElementById('cardTrigger');
      if (data.trigger) {
        triggerEl.textContent = data.trigger;
        triggerEl.style.display = 'block';
      } else {
        triggerEl.style.display = 'none';
      }
      document.getElementById('cardTitle').textContent = data.title;
      document.getElementById('cardDesc').textContent = stripAnnouncerTags(data.description);
      document.getElementById('cardReward').textContent = data.reward;
      document.getElementById('cardActions').style.display = data.id ? 'block' : 'none';
      const card = document.getElementById('card');
      card.classList.remove('visible');
      void card.offsetWidth; /* reset animation */
      card.classList.add('visible');
    }

    function handleShare() {
      if (!currentAchievementId) return;
      const a = document.createElement('a');
      a.href = `/api/achievements/${currentAchievementId}/card.png`;
      a.download = `achievement_${currentAchievementId}.png`;
      a.click();
    }

    function handleShareLink() {
      if (!currentAchievementId) return;
      const url = `${window.location.origin}/a/${currentAchievementId}`;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('shareLinkBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy Link'; }, 2000);
      }).catch(() => {
        /* Fallback: prompt with the URL */
        prompt('Share this link:', url);
      });
    }

    function setStatus(text, pulsing = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = pulsing ? 'status pulsing' : 'status';
    }

    function parseSSEEvents(text) {
      /* Parse SSE format: "event: name\ndata: json\n\n" */
      const events = [];
      const blocks = text.split('\n\n');
      for (const block of blocks) {
        if (!block.trim()) continue;
        const lines = block.split('\n');
        let event = '', data = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) event = line.slice(7);
          if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (event && data) {
          try { events.push({ event, data: JSON.parse(data) }); } catch {}
        }
      }
      return events;
    }

    async function handleGenerate() {
      unlockAudio(); /* must happen during user gesture (click) */
      const btn = document.getElementById('generate');
      const input = document.getElementById('trigger');
      const trigger = input.value.trim() || null;

      btn.disabled = true;
      setStatus('Summoning achievement...', true);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trigger }),
        });
        if (!res.ok) throw new Error('Generation failed');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let processed = new Set();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          for (const evt of parseSSEEvents(buffer)) {
            const key = evt.event + JSON.stringify(evt.data);
            if (processed.has(key)) continue;
            processed.add(key);

            if (evt.event === 'achievement') {
              showCard(evt.data);
              setStatus('Synthesizing audio...', true);
              input.value = '';
            } else if (evt.event === 'audio') {
              if (evt.data.audio_urls && evt.data.audio_urls.length > 0) {
                setStatus('Playing audio...', true);
                await playSequence(evt.data.audio_urls);
              }
              setStatus('');
            } else if (evt.event === 'done') {
              loadHistory();
            }
          }
        }
      } catch (err) {
        setStatus('Error: ' + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function handleReplay(id) {
      unlockAudio();
      setStatus('Loading achievement...', true);
      try {
        const res = await fetch(`/api/achievements/${id}`);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();

        showCard(data);
        setStatus('Playing audio...', true);

        if (data.audio_urls && data.audio_urls.length > 0) {
          await playSequence(data.audio_urls);
        }
        setStatus('');
      } catch (err) {
        setStatus('Error: ' + err.message);
      }
    }

    let historyPage = 0;

    async function loadHistory(page) {
      if (page !== undefined) historyPage = page;
      try {
        const res = await fetch(`/api/achievements?page=${historyPage}&page_size=10`);
        const data = await res.json();
        const list = document.getElementById('historyList');

        if (data.total === 0) {
          list.innerHTML = '<p class="history-empty">No achievements yet. Go do something questionable.</p>';
          return;
        }

        let html = data.items.map(e => `
          <div class="history-item" onclick="handleReplay(${e.id})">
            <span class="title">${e.title}</span>
            <span class="trigger">${e.trigger || 'random'}</span>
          </div>
        `).join('');

        if (data.total_pages > 1) {
          html += '<div class="history-pagination">';
          if (historyPage > 0) {
            html += `<span class="page-btn" onclick="loadHistory(${historyPage - 1})">&laquo; Prev</span>`;
          }
          html += `<span class="page-info">${data.page + 1} / ${data.total_pages}</span>`;
          if (historyPage < data.total_pages - 1) {
            html += `<span class="page-btn" onclick="loadHistory(${historyPage + 1})">Next &raquo;</span>`;
          }
          html += '</div>';
        }

        list.innerHTML = html;
      } catch (err) {
        console.error('Failed to load history', err);
      }
    }

    /* submit on Enter */
    document.getElementById('trigger').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleGenerate();
    });

    /* Deep link: /a/{id} auto-loads and plays that achievement */
    async function checkDeepLink() {
      const match = window.location.pathname.match(/^\/a\/(\d+)$/);
      if (!match) return;
      const id = parseInt(match[1]);
      unlockAudio();
      await handleReplay(id);
    }

    /* load history on page load, then check for deep link */
    loadHistory();
    checkDeepLink();
  </script>
</body>
</html>
