<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Crawl Log</title>
  <meta property="og:title" content="The Crawl Log">
  <meta property="og:description" content="Congratulations, you're still alive. For now.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      color: #f0c040;
      font-size: 1.8rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .subtitle {
      color: #888;
      font-size: 0.8rem;
      margin-bottom: 2rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
    }
    input[type="text"]::placeholder { color: #555; }
    input[type="text"]:focus { outline: none; border-color: #f0c040; }
    button {
      padding: 0.75rem 1.5rem;
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #ffd060; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }

    .status {
      color: #f0c040;
      font-size: 0.85rem;
      height: 1.2rem;
      margin-bottom: 1rem;
    }
    .status.pulsing { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .card {
      width: 100%;
      max-width: 600px;
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: none;
      position: relative;
      overflow: hidden;
    }
    .card.visible {
      display: block;
      animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Slide up with overshoot bounce */
    @keyframes cardReveal {
      0% { opacity: 0; transform: translateY(40px) scale(0.95); }
      60% { opacity: 1; transform: translateY(-4px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Rarity tier border colors and glow */
    .card.rarity-bronze { border-color: #cd7f32; }
    .card.rarity-silver { border-color: #c0c0c0; }
    .card.rarity-gold { border-color: #f0c040; }
    .card.rarity-legendary { border-color: #ff6ec7; }

    /* Glow pulse on reveal — rarity-colored */
    .card.visible.rarity-gold {
      animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), glowGold 1.5s ease-out 0.3s;
    }
    .card.visible.rarity-legendary {
      animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), glowLegendary 2s ease-out 0.3s;
    }
    .card.rarity-gold { box-shadow: 0 0 12px rgba(240, 192, 64, 0.3); }
    .card.rarity-legendary { box-shadow: 0 0 20px rgba(255, 110, 199, 0.4); }

    @keyframes glowGold {
      0% { box-shadow: 0 0 5px rgba(240, 192, 64, 0.2); }
      40% { box-shadow: 0 0 30px rgba(240, 192, 64, 0.6), 0 0 60px rgba(240, 192, 64, 0.2); }
      100% { box-shadow: 0 0 12px rgba(240, 192, 64, 0.3); }
    }
    @keyframes glowLegendary {
      0% { box-shadow: 0 0 5px rgba(255, 110, 199, 0.2); }
      30% { box-shadow: 0 0 40px rgba(255, 110, 199, 0.7), 0 0 80px rgba(255, 110, 199, 0.3); }
      60% { box-shadow: 0 0 25px rgba(255, 110, 199, 0.5), 0 0 50px rgba(200, 80, 255, 0.2); }
      100% { box-shadow: 0 0 20px rgba(255, 110, 199, 0.4); }
    }

    /* Sparkle particles for Gold/Legendary — CSS-only */
    .card.rarity-gold.visible::before,
    .card.rarity-legendary.visible::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 20% 15%, rgba(255, 255, 200, 0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 25%, rgba(255, 255, 200, 0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255, 255, 200, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255, 255, 200, 0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255, 255, 200, 0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 90%, rgba(255, 255, 200, 0.6) 0%, transparent 100%);
      animation: sparkle 2s ease-out 0.4s both;
    }
    .card.rarity-legendary.visible::before {
      background-image:
        radial-gradient(1.5px 1.5px at 20% 15%, rgba(255, 180, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 25%, rgba(200, 150, 255, 0.7) 0%, transparent 100%),
        radial-gradient(2px 2px at 50% 10%, rgba(255, 200, 255, 1) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 15% 80%, rgba(255, 150, 220, 0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(200, 180, 255, 0.8) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 90%, rgba(255, 180, 255, 0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 50%, rgba(255, 220, 255, 0.9) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 70% 45%, rgba(200, 150, 255, 0.8) 0%, transparent 100%);
    }
    @keyframes sparkle {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Staggered content reveal */
    .card.visible .card-top-row { animation: contentFade 0.4s ease-out 0.15s both; }
    .card.visible .card-trigger { animation: contentFade 0.4s ease-out 0.25s both; }
    .card.visible .card-title-row { animation: contentFade 0.5s ease-out 0.3s both; }
    .card.visible .card-desc { animation: contentFade 0.4s ease-out 0.45s both; }
    .card.visible .card-reward { animation: contentFade 0.4s ease-out 0.6s both; }
    .card.visible .card-actions { animation: contentFade 0.3s ease-out 0.75s both; }
    @keyframes contentFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .rarity-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      margin-left: 0.6rem;
    }
    .rarity-bronze .rarity-label { color: #cd7f32; }
    .rarity-silver .rarity-label { color: #c0c0c0; }
    .rarity-gold .rarity-label { color: #f0c040; }
    .rarity-legendary .rarity-label { color: #ff6ec7; }

    .card-header {
      background: #f0c040;
      color: #1a1a2e;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.8rem;
      display: inline-block;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .card-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }
    .card-header { margin-bottom: 0; }
    .card-date {
      color: #666;
      font-size: 0.7rem;
    }
    .card-trigger {
      color: #666;
      font-size: 0.75rem;
      font-style: italic;
      margin-bottom: 0.6rem;
    }
    .card-trigger::before { content: '"'; }
    .card-trigger::after { content: '"'; }
    .card-title-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.8rem;
    }
    .card-badge {
      width: 2rem;
      height: 2rem;
      filter: invert(78%) sepia(60%) saturate(500%) hue-rotate(5deg);  /* gold tint */
      flex-shrink: 0;
    }
    .card-title {
      color: #f0c040;
      font-size: 1.3rem;
    }
    .card-desc {
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .card-reward {
      border-top: 1px solid #333;
      padding-top: 0.8rem;
      color: #e0e0e0;
    }
    .card-reward strong { color: #f0c040; margin-right: 0.5rem; }
    .card-actions { margin-top: 1rem; }
    .share-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      color: #f0c040;
      border: 1px solid #f0c040;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      margin-left: 0.8rem;
    }
    .share-btn:first-child { margin-left: 0; }
    .share-btn:hover { background: #f0c040; color: #1a1a2e; }
    .play-btn { background: #f0c040; color: #1a1a2e; margin-bottom: 0.8rem; }

    .history { width: 100%; max-width: 600px; }
    .history h2 {
      color: #888;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.4rem;
    }
    .history-item {
      padding: 0.6rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 0.3rem;
    }
    .history-item:hover { background: #16213e; }
    .history-top-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .history-badge {
      width: 1rem;
      height: 1rem;
      filter: invert(78%) sepia(60%) saturate(500%) hue-rotate(5deg);
      flex-shrink: 0;
    }
    .history-item .title { color: #f0c040; font-size: 0.85rem; flex: 1; }
    .history-rarity {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .history-rarity.r-bronze { background: #cd7f32; }
    .history-rarity.r-silver { background: #c0c0c0; }
    .history-rarity.r-gold { background: #f0c040; }
    .history-rarity.r-legendary { background: #ff6ec7; }
    .history-date { color: #555; font-size: 0.7rem; white-space: nowrap; }
    .history-item .trigger { color: #666; font-size: 0.7rem; margin-top: 0.15rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-empty { color: #555; font-size: 0.85rem; font-style: italic; }
    .history-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 0 0.2rem;
      border-top: 1px solid #333;
      margin-top: 0.3rem;
    }
    .page-btn {
      color: #f0c040;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .page-btn:hover { text-decoration: underline; }
    .page-info { color: #666; font-size: 0.75rem; }

    /* Daily Challenge banner */
    .daily-challenge {
      width: 100%;
      max-width: 600px;
      background: linear-gradient(135deg, #1e2a4a 0%, #16213e 100%);
      border: 1px solid #f0c04066;
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.2rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .daily-challenge:hover {
      border-color: #f0c040;
      box-shadow: 0 0 8px rgba(240, 192, 64, 0.2);
    }
    .daily-challenge-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .daily-challenge-label {
      color: #f0c040;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
    }
    .daily-challenge-date {
      color: #555;
      font-size: 0.65rem;
    }
    .daily-challenge-text {
      color: #ccc;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .daily-challenge-hint {
      color: #666;
      font-size: 0.65rem;
      margin-top: 0.3rem;
    }

    /* Mobile responsive */
    @media (max-width: 640px) {
      body { padding: 1.2rem 0.8rem; }
      h1 { font-size: 1.3rem; letter-spacing: 2px; text-align: center; }
      .subtitle { font-size: 0.7rem; text-align: center; margin-bottom: 1.2rem; }
      .daily-challenge { padding: 0.7rem 0.8rem; }
      .daily-challenge-text { font-size: 0.8rem; }
      .input-row { flex-direction: column; }
      input[type="text"] { font-size: 1rem; padding: 0.9rem 1rem; }
      button { padding: 0.9rem; font-size: 1rem; }
      .card { padding: 1.2rem; }
      .card-header { font-size: 0.7rem; letter-spacing: 1px; }
      .card-title { font-size: 1.1rem; }
      .card-desc { font-size: 0.85rem; line-height: 1.5; }
      .card-reward { font-size: 0.85rem; }
      .card-reward strong { display: block; margin-bottom: 0.3rem; }
      .history-item { flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .history-item .trigger { max-width: 100%; }
      .share-btn { display: block; width: 100%; padding: 0.8rem; font-size: 0.85rem; margin-left: 0; margin-bottom: 0.8rem; }
      .share-btn:last-child { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <h1>The Crawl Log</h1>
  <p class="subtitle">congratulations, you're still alive. for now.</p>

  <div class="daily-challenge" id="dailyChallenge" onclick="useDailyChallenge()">
    <div class="daily-challenge-header">
      <span class="daily-challenge-label">Daily Challenge</span>
      <span class="daily-challenge-date" id="dailyChallengeDate"></span>
    </div>
    <div class="daily-challenge-text" id="dailyChallengeText"></div>
    <div class="daily-challenge-hint">click to accept the challenge</div>
  </div>

  <div class="input-row">
    <input type="text" id="trigger" placeholder="e.g. took a 2 hour lunch and nobody noticed" maxlength="200" />
    <button id="generate" onclick="handleGenerate()" disabled>Generate</button>
  </div>

  <div class="status" id="status"></div>

  <div class="card" id="card">
    <div class="card-top-row">
      <div><span class="card-header">Achievement Unlocked</span><span class="rarity-label" id="cardRarity"></span></div>
      <div class="card-date" id="cardDate"></div>
    </div>
    <div class="card-trigger" id="cardTrigger"></div>
    <div class="card-title-row">
      <img class="card-badge" id="cardBadge" src="" alt="" style="display:none;">
      <div class="card-title" id="cardTitle"></div>
    </div>
    <div class="card-desc" id="cardDesc"></div>
    <div class="card-reward"><strong>REWARD</strong> <span id="cardReward"></span></div>
    <div class="card-actions" id="cardActions" style="display:none;">
      <button class="share-btn play-btn" id="playBtn" onclick="handlePlayFromCard()" style="display:none;">Play</button>
      <button class="share-btn" id="shareLinkBtn" onclick="handleShareLink()">Share</button>
    </div>
  </div>

  <div class="history">
    <h2>Achievement History</h2>
    <div id="historyList"><p class="history-empty">No achievements yet. Go do something questionable.</p></div>
  </div>

  <script>
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    /* Audio unlock strategy for mobile browsers:
       1. On user click, play a silent audio buffer through a shared Audio element
       2. Reuse that same element for all subsequent playback
       This keeps the audio pipeline "warm" so plays work after async delays (SSE) */
    let sharedAudio = null;

    function unlockAudio() {
      if (sharedAudio) return;
      sharedAudio = new Audio();
      /* Play a tiny silent WAV (44 bytes, valid WAV header with 0 samples) */
      sharedAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
      sharedAudio.play().catch(() => {});
    }

    function playAudio(url) {
      return new Promise((resolve) => {
        /* Reuse the shared audio element to stay in the browser's
           allowed-playback chain from the original user gesture */
        const audio = sharedAudio || new Audio();
        sharedAudio = audio;
        audio.onended = () => resolve();
        audio.onerror = () => {
          console.warn('Audio playback failed, skipping:', url);
          resolve();
        };
        audio.src = url;
        audio.play().catch(() => {
          console.warn('Audio play blocked, skipping:', url);
          resolve();
        });
      });
    }

    async function playSequence(urls) {
      /* Single concatenated file — pauses are baked into the audio */
      if (urls.length > 0) {
        await playAudio(urls[0]);
      }
    }

    let currentAchievementId = null;

    function stripAnnouncerTags(desc) {
      return desc.replace(/^New Achievement!\s*/i, '').replace(/\s*Your Reward!\s*$/i, '').trim();
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    const RARITY_CLASSES = ['rarity-bronze', 'rarity-silver', 'rarity-gold', 'rarity-legendary'];

    function showCard(data) {
      currentAchievementId = data.id;
      pendingAudioUrls = null;
      document.getElementById('playBtn').style.display = 'none';
      document.getElementById('cardDate').textContent = formatDate(data.timestamp);

      /* Rarity tier */
      const card = document.getElementById('card');
      RARITY_CLASSES.forEach(c => card.classList.remove(c));
      const rarity = data.rarity || 'bronze';
      card.classList.add('rarity-' + rarity);
      document.getElementById('cardRarity').textContent = rarity;
      const badgeEl = document.getElementById('cardBadge');
      if (data.badge) {
        badgeEl.src = `/static/badges/${data.badge}.svg`;
        badgeEl.alt = data.badge;
        badgeEl.style.display = 'block';
      } else {
        badgeEl.style.display = 'none';
      }
      const triggerEl = document.getElementById('cardTrigger');
      if (data.trigger) {
        triggerEl.textContent = data.trigger;
        triggerEl.style.display = 'block';
      } else {
        triggerEl.style.display = 'none';
      }
      document.getElementById('cardTitle').textContent = data.title;
      document.getElementById('cardDesc').textContent = stripAnnouncerTags(data.description);
      document.getElementById('cardReward').textContent = data.reward;
      document.getElementById('cardActions').style.display = data.id ? 'block' : 'none';
      card.classList.remove('visible');
      void card.offsetWidth; /* reset animation */
      card.classList.add('visible');
    }

    function handleShare() {
      if (!currentAchievementId) return;
      const a = document.createElement('a');
      a.href = `/api/achievements/${currentAchievementId}/card.png`;
      a.download = `achievement_${currentAchievementId}.png`;
      a.click();
    }

    function handleShareLink() {
      if (!currentAchievementId) return;
      const url = `${window.location.origin}/a/${currentAchievementId}`;
      const title = document.getElementById('cardTitle').textContent;
      const btn = document.getElementById('shareLinkBtn');

      function showCopied() {
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Share'; }, 2000);
      }

      /* Try native share sheet (requires HTTPS), then clipboard, then prompt */
      if (navigator.share && window.isSecureContext) {
        navigator.share({ title, url }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(showCopied).catch(() => {
          prompt('Share this link:', url);
        });
      } else {
        prompt('Share this link:', url);
      }
    }

    function setStatus(text, pulsing = false) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = pulsing ? 'status pulsing' : 'status';
    }

    function parseSSEEvents(text) {
      /* Parse SSE format: "event: name\ndata: json\n\n" */
      const events = [];
      const blocks = text.split('\n\n');
      for (const block of blocks) {
        if (!block.trim()) continue;
        const lines = block.split('\n');
        let event = '', data = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) event = line.slice(7);
          if (line.startsWith('data: ')) data = line.slice(6);
        }
        if (event && data) {
          try { events.push({ event, data: JSON.parse(data) }); } catch {}
        }
      }
      return events;
    }

    async function handleGenerate() {
      unlockAudio(); /* must happen during user gesture (click) */
      const btn = document.getElementById('generate');
      const input = document.getElementById('trigger');
      const trigger = input.value.trim() || null;

      btn.disabled = true;
      setStatus('Summoning achievement...', true);

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trigger }),
        });
        if (!res.ok) throw new Error('Generation failed');

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let processed = new Set();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          for (const evt of parseSSEEvents(buffer)) {
            const key = evt.event + JSON.stringify(evt.data);
            if (processed.has(key)) continue;
            processed.add(key);

            if (evt.event === 'achievement') {
              showCard(evt.data);
              setStatus('Synthesizing audio...', true);
              input.value = '';
            } else if (evt.event === 'audio') {
              if (evt.data.audio_urls && evt.data.audio_urls.length > 0) {
                pendingAudioUrls = evt.data.audio_urls;
                document.getElementById('playBtn').style.display = 'inline-block';
                /* Try auto-play (works if gesture chain intact), show Play button as fallback */
                try {
                  setStatus('Playing audio...', true);
                  await playSequence(evt.data.audio_urls);
                } catch (e) { /* Play button is there as fallback */ }
              }
              setStatus('');
            } else if (evt.event === 'done') {
              loadHistory();
            }
          }
        }
      } catch (err) {
        setStatus('Error: ' + err.message);
      } finally {
        btn.disabled = !input.value.trim();
      }
    }

    async function handleReplay(id) {
      unlockAudio();
      setStatus('Loading achievement...', true);
      try {
        const res = await fetch(`/api/achievements/${id}`);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();

        showCard(data);

        if (data.audio_urls && data.audio_urls.length > 0) {
          pendingAudioUrls = data.audio_urls;
          document.getElementById('playBtn').style.display = 'inline-block';
          setStatus('');
        } else {
          setStatus('');
        }
      } catch (err) {
        setStatus('Error: ' + err.message);
      }
    }

    let historyPage = 0;

    async function loadHistory(page) {
      if (page !== undefined) historyPage = page;
      try {
        const res = await fetch(`/api/achievements?page=${historyPage}&page_size=10`);
        const data = await res.json();
        const list = document.getElementById('historyList');

        if (data.total === 0) {
          list.innerHTML = '<p class="history-empty">No achievements yet. Go do something questionable.</p>';
          return;
        }

        let html = data.items.map(e => `
          <div class="history-item" onclick="handleReplay(${e.id})">
            <div class="history-top-row">
              <span class="history-rarity r-${e.rarity || 'bronze'}"></span>
              ${e.badge ? `<img class="history-badge" src="/static/badges/${e.badge}.svg" alt="">` : ''}
              <span class="title">${e.title}</span>
              <span class="history-date">${formatDate(e.timestamp)}</span>
            </div>
            <div class="trigger">${e.trigger || 'random'}</div>
          </div>
        `).join('');

        if (data.total_pages > 1) {
          html += '<div class="history-pagination">';
          if (historyPage > 0) {
            html += `<span class="page-btn" onclick="loadHistory(${historyPage - 1})">&laquo; Prev</span>`;
          }
          html += `<span class="page-info">${data.page + 1} / ${data.total_pages}</span>`;
          if (historyPage < data.total_pages - 1) {
            html += `<span class="page-btn" onclick="loadHistory(${historyPage + 1})">Next &raquo;</span>`;
          }
          html += '</div>';
        }

        list.innerHTML = html;
      } catch (err) {
        console.error('Failed to load history', err);
      }
    }

    /* Enable/disable Generate button based on input content */
    const triggerInput = document.getElementById('trigger');
    const generateBtn = document.getElementById('generate');
    triggerInput.addEventListener('input', () => {
      generateBtn.disabled = !triggerInput.value.trim();
    });

    /* submit on Enter (only if input is non-empty) */
    triggerInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && triggerInput.value.trim()) handleGenerate();
    });

    let pendingAudioUrls = null;

    async function handlePlayFromCard() {
      unlockAudio();
      const btn = document.getElementById('playBtn');
      if (pendingAudioUrls && pendingAudioUrls.length > 0) {
        btn.textContent = 'Playing...';
        btn.disabled = true;
        await playSequence(pendingAudioUrls);
        btn.textContent = 'Play';
        btn.disabled = false;
      }
    }

    /* Deep link: /a/{id} loads the card and shows a Play button */
    async function checkDeepLink() {
      const match = window.location.pathname.match(/^\/a\/(\d+)$/);
      if (!match) return;
      const id = parseInt(match[1]);
      try {
        const res = await fetch(`/api/achievements/${id}`);
        if (!res.ok) return;
        const data = await res.json();
        showCard(data);
        if (data.audio_urls && data.audio_urls.length > 0) {
          pendingAudioUrls = data.audio_urls;
          document.getElementById('playBtn').style.display = 'inline-block';
        }
      } catch (err) {
        console.error('Deep link failed', err);
      }
    }

    /* Daily Challenge — one prompt per day, deterministic by date */
    const DAILY_CHALLENGES = [
      'Do something your manager would not approve of',
      'Accomplish something while technically doing something else',
      'Break something that was working fine before you touched it',
      'Eat something you probably should not have',
      'Send a message you immediately regret',
      'Automate something that takes less time to do manually',
      'Attend a meeting you have no business being in',
      'Procrastinate on something important by doing something useless',
      'Fix a problem you personally created',
      'Take an unreasonably long break and see if anyone notices',
      'Have a conversation you have been avoiding',
      'Google something embarrassingly basic for your job',
      'Say yes to something you should have said no to',
      'Convince someone of something you made up on the spot',
      'Spend money on something you absolutely do not need',
      'Start a project you know you will never finish',
      'Survive an interaction that should not have been that difficult',
      'Do the bare minimum and see if anyone can tell',
      'Accidentally make someone else look bad',
      'Try to be productive before 9am and see what happens',
      'Explain something you do not actually understand',
      'Organize something that will be messy again within 24 hours',
      'Make a decision based entirely on laziness',
      'Take credit for something the universe handed you',
      'Complain about something you could easily fix yourself',
      'Overengineer a solution to a trivial problem',
      'Show up somewhere overdressed or underdressed',
      'Accidentally reveal something you were not supposed to know',
      'Attempt to cook something ambitious and report the results',
      'Do something nice for someone and immediately undermine it',
      'Lose track of time doing something completely pointless',
    ];

    function getDailyChallenge() {
      const now = new Date();
      const dateStr = now.toISOString().slice(0, 10);
      /* Simple hash from date string to get a stable daily index */
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) {
        hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
        hash |= 0;
      }
      const idx = Math.abs(hash) % DAILY_CHALLENGES.length;
      return { text: DAILY_CHALLENGES[idx], date: dateStr };
    }

    function useDailyChallenge() {
      const challenge = getDailyChallenge();
      triggerInput.value = '[Daily Challenge] ' + challenge.text;
      triggerInput.dispatchEvent(new Event('input'));
      triggerInput.focus();
    }

    /* Initialize daily challenge banner */
    const dc = getDailyChallenge();
    document.getElementById('dailyChallengeText').textContent = dc.text;
    document.getElementById('dailyChallengeDate').textContent = new Date(dc.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    /* Random trigger suggestions — rotates placeholder text on each page load */
    const SUGGESTIONS = [
      'took a 2 hour lunch and nobody noticed',
      'mass-deleted a production database',
      'replied-all to the entire company',
      'pushed to prod on a Friday at 4:59pm',
      'fell asleep in a meeting with my camera on',
      'forgot to mute and said something regrettable',
      'spent 3 hours debugging a typo',
      'accidentally emailed my resume to my boss',
      'showed up to the wrong meeting and stayed anyway',
      'broke the build right before a demo',
      'ate someone else\'s lunch from the fridge',
      'automated my job and told no one',
      'got locked out of every account on the same day',
      'merged to main without reading the diff',
      'spent an hour writing a message then deleted it',
      'said "let\'s circle back" and meant it',
      'googled something I should definitely already know',
      'created a Jira ticket to track creating Jira tickets',
      'survived a meeting that could have been an email',
      'deployed on a Friday and it actually worked',
    ];
    triggerInput.placeholder = 'e.g. ' + SUGGESTIONS[Math.floor(Math.random() * SUGGESTIONS.length)];

    /* load history on page load, then check for deep link */
    loadHistory();
    checkDeepLink();
  </script>
</body>
</html>
